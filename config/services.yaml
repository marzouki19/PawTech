# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    streams.directory: '%kernel.project_dir%/public/streams'
    app.mailer_from_default: 'noreply@pawtech.local'
    app.gemini_api_key_default: ''
    app.weather_api_key_default: ''
    app.twilio_account_sid_default: ''
    app.twilio_auth_token_default: ''
    app.twilio_phone_default: ''
    app.twilio_country_default: '+216'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $mailerFrom: '%env(default:app.mailer_from_default:MAILER_FROM)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\StreamTranscoderService:
        arguments:
            $streamsDirectory: '%streams.directory%'

    App\Service\DirectRtspService:
        arguments:
            $streamsDirectory: '%streams.directory%'

    App\Service\GeminiService:
        arguments:
            $apiKey: '%env(default:app.gemini_api_key_default:GEMINI_API_KEY)%'

    App\Service\WeatherApiService:
        arguments:
            $apiKey: '%env(default:app.weather_api_key_default:OPENWEATHER_API_KEY)%'

    App\Service\TwilioNotificationService:
        arguments:
            $accountSid: '%env(default:app.twilio_account_sid_default:TWILIO_ACCOUNT_SID)%'
            $authToken: '%env(default:app.twilio_auth_token_default:TWILIO_AUTH_TOKEN)%'
            $twilioPhoneNumber: '%env(default:app.twilio_phone_default:TWILIO_PHONE_NUMBER)%'
            $defaultCountryCode: '%env(default:app.twilio_country_default:TWILIO_DEFAULT_COUNTRY_CODE)%'

    # Override HLS stream URLs to add no-cache headers
    Symfony\Component\Routing\Loader\Configurator\RoutingConfigurator: null
    
    # Add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
